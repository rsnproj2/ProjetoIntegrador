<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Criar Conta</title>
        <link rel="icon" type="image/x-icon" href="img/favicon.ico">
        <link rel="stylesheet" href="css/tela-login.css">
    </head>
    <body>
        <section class="form-container">
            
            <!--Imagem ilustrativa de cadastro -->
            <section class="image-side">
                <img src="./img/tela-cadastro.jpg" alt="imagem-cadastro">
            </section>

            <!--Formulário de cadastro-->
            <section class="form-side">
                <h2>Criar Conta</h2>

                <article class="input-box">
                    <input type="text" placeholder="" required>
                    <span>Nome de Usuário</span>
                </article>

                <article class="input-box">
                    <input type="email" placeholder="" required>
                    <span>Email</span>
                </article>

                <article class="input-box">
                    <input type="password" placeholder="" required>
                    <span>Senha</span>
                </article>

                <article class="input-box">
                    <input type="password" placeholder="" required>
                    <span>Confirmar Senha</span>
                </article>

                <article class="button-box">
                    <button class="submit-btn">Cadastrar</button>
                </article>

                <article class="account-box">
                    <p>Já tem conta? <a href="tela-login.html">Entrar →</a></p>
                </article>
            </section>

        </section>


    </body>
</html>
