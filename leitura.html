<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitura</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <header>
        <nav class="container nav">
            <h1 class="logo">ParaBook</h1>

            <ul class="menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="livros.html">Meus Livros</a></li>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="tela-login.html"><button class="login-btn">Entrar</button></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="banner">
            <article class="container banner-content">
                <h2>Bem-vindo ao ParaBook!</h2>
                <p>
                    Seu destino para encontrar e compartilhar livros incríveis.
                    Explore nosso acervo e descubra novos títulos.
                </p>
            </article>
        </section>

        <!-- registro da leitura do livro-->
        <section class="container leitura-container">
            <section class="livro-info">
                <h2 id="titulo"></h2>
                <p id="autor"></p>
            </section>

            <!--leitor em pdf -->
            <section class="leitor-pdf">
                <iframe
                    id="pdf"
                    title="Leitor de PDF do livro"
                    width="100%"
                    height="700">
                    Seu navegador não suporta visualização de PDF.
                </iframe>
            </section>

            <!-- opção de voltar-->
            <div class="acoes">
                <a href="acesso-biblioteca.html" class="btn">Voltar</a>
            </div>
        </section>
    </main>

    <footer class="footer">
        <h1 class="footer-titulo">&copy; ParaBook</h1>
        <span>2026. Todos os direitos reservados.</span>
    </footer>

    <script src="js/script.js"></script>

</body>
</html>
