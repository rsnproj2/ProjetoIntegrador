<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Leitura</title>
        <link rel="icon" type="image/x-icon" href="img/favicon.ico">
        <link rel="stylesheet" href="css/leitura.css">
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>

    <body>
        <header>
            <nav class="container nav">

                <div class="logo-container">
                    <img src="img/logo-nova.png" alt="Logo Parabook"
                        class="logo-img">
                    <h1 class="logo"><span class="para">Para</span><span
                            class="book">Book</span></h1>
                </div>
                <ul class="menu">
                    <li><a href="index.html"><button class="login-btn">Início</button></a></li>
                </ul>
            </nav>
        </header>

 <main>

        <section class="container leitura-container">

            <!-- INFO DO LIVRO -->
            <section class="livro-info">
                <h2 id="titulo"></h2>
                <p id="autor"></p>
            </section>

            <!-- LOADING STATE (UX MELHORADA) -->
            <div id="loading" class="loading-state">
            </div>

            <!-- VISUALIZAÇÃO PDF -->
            <section class="leitor-pdf">
                <canvas id="pdf-canvas"></canvas>
            </section>

            <!-- PROGRESSO -->
            <div class="progresso-container">
                <div id="barra-progresso"></div>
            </div>

            <!-- CONTROLES -->
            <div class="controles-leitura">

                <button onclick="paginaAnterior()" class="btn">
                    <i class="fa-solid fa-arrow-left"></i> Anterior
                </button>

                <span id="pagina-info">Página 1</span>

                <button onclick="proximaPagina()" class="btn">
                    Próxima <i class="fa-solid fa-arrow-right"></i>
                </button>

            </div>

            <!-- AÇÕES -->
            <div class="acoes">
                <a href="acesso-biblioteca.html" class="btn secondary">
                    Voltar à Biblioteca
                </a>
            </div>

        </section>
    </main>


        <footer class="footer">
            <div class="footer-container">

                <div class="footer-brand">
                    <h2>ParaBook</h2>
                    <p>O melhor site de livros.</p>
                </div>

                <div class="footer-links">
                    <h4>Links</h4>
                    <a href="index.html">Início</a>
                    <a href="biblioteca.html">Biblioteca</a>
                    <a href="comunidade.html">Comunidades</a>
                </div>

                <div class="footer-social">
                    <h4>Redes</h4>
                    <div class="icons">
                        <i class="fa-brands fa-instagram"></i>
                        <i class="fa-brands fa-facebook"></i>
                        <i class="fa-brands fa-github"></i>
                    </div>
                </div>

            </div>

            <div class="footer-bottom">
                <p>© 2026. Todos os direitos reservados.</p>
            </div>
        </footer>
        <hr class="footer-bottom-line">

    <script src="js/biblioteca.js"></script>
    <script src="js/leitura.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    </body>
</html>
