<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
        <link rel="stylesheet" href="css/tela-login.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>

    <body>

    <header>
        <nav class="container nav">
            <ul class="menu">
                <li><a href="index.html"><button class="voltar-btn">Voltar ao Menu</button></a></li>
            </ul>
        </nav>
    </header>

    <main class="form-container" id="container">

        <section class="image-side">
            <img src="img/login-bg.jpg" alt="imagem-login"/>
        </section>

        <!------------- CAMPO DE LOGIN ------------->
        <section class="form-side login-form">
            <form id="formLogin" novalidate>
                <h2>Login</h2>
                <!-- Campo de usuário -->
                <article class="input-box">
                    <input type="text" id="loginUser" required placeholder=" " />
                    <span>Usuário</span>
                </article>
                <!-- Campo de email -->
                <article class="input-box">
                    <input type="email" id="loginEmail" required placeholder=" " />
                    <span>E-mail</span>
                </article>
                <!-- Campo de senha -->
                <article class="input-box password-box">
                    <input type="password" id="loginPassword" required placeholder=" " />
                    <span>Senha</span>
                    <button type="button" class="toggle-password" data-target="loginPassword">👁</button>
                </article>
                
                <article class="button-box">
                    <button class="submit-btn" id="btnLogin">Entrar</button>
                </article>

                <article class="input-box">
                    <p>Esqueceu <a href="#" id="showForgot">nome de usuário/senha?</a></p>
                </article>

                <article class="account-box">
                    <p>
                        Não tem conta?
                        <a href="#" id="showRegister">Crie sua Conta →</a>
                    </p>
                </article>
            </form>
        </section>


        <!------------- CAMPO DE REGISTRO ------------->
        <section class="form-side register-form">
            <form id="formRegister" novalidate>
                <h2>Criar Conta</h2>
                
                <article class="input-box">
                    <input type="text" id="registerUser" required placeholder=" " />
                    <span>Nome de Usuário</span>
                </article>

                <article class="input-box">
                    <input type="email" id="registerEmail" required placeholder=" " />
                    <span>Email</span>
                </article>

                <article class="input-box password-box">
                    <input type="password" id="registerPassword" required placeholder=" " />
                    <span>Senha</span>
                    <button type="button" class="toggle-password" data-target="registerPassword">👁</button>
                </article>

                <article class="input-box password-box">
                    <input type="password" id="confirmPassword" required placeholder=" " />
                    <span>Confirmar Senha</span>
                    <button type="button" class="toggle-password" data-target="confirmPassword">👁</button>
                </article>

                <article class="button-box">
                    <button class="submit-btn" id="btnRegister">Cadastrar</button>
                </article>

                <article class="account-box">
                    <p>
                        Já tem conta?
                        <a href="#" id="showLogin">Entrar →</a>
                    </p>
                </article>
            </form>
        </section>

        <!------------- CAMPO DE RECUPERAR SENHA ------------->
        <section class="form-side forgot-form">
            <form id="formRecover" novalidate>
                <h2>Recuperar Senha</h2>
                
                <article class="input-box">
                    <input type="email" required />
                    <span>Digite seu e-mail</span>
                </article>

                <article class="button-box">
                    <button class="submit-btn">Enviar link</button>
                </article>

                <article class="account-box">
                    <p>
                        Lembrou a senha?
                        <a href="#" id="backToLogin">Entrar →</a>
                    </p>
                </article>
            </form>
        </section>
