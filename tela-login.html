<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <link rel="icon" type="image/x-icon" href="/img/favicon.ico">
        <link rel="stylesheet" href="/css/tela-login.css">
    </head>

    <body>

        <section class="form-container">

            <section class="image-side">
                <img src="https://img.freepik.com/fotos-gratis/pessoas-de-alto-angulo-lendo-juntas_23-2150062128.jpg?semt=ais_hybrid&w=740&q=80" alt="login-image">
            </section>

            <section class="form-side">
                <h2>Login</h2>
        
                <article class="input-box">
                    <input type="text" placeholder="">
                    <span>Username</span>
                </article>

                <article class="input-box">
                    <input type="email" placeholder="">
                    <span>Email</span>
                </article>

                <article class="input-box">
                    <input type="password" placeholder="">
                    <span>Password</span>
                </article>

                <article class="button-box">
                    <button class="submit-btn">Entrar</button>
                </article>

                <article class="input-box">
                    <p>Esqueceu <a href="#">nome de Usuário/Senha?</a></p>
                </article>

                <article class="account-box">
                    <p><a href="tela-cadastro.html">Crie sua Conta →</a></p>
                </article>

            </section>

        </section>

</body>
</html>
