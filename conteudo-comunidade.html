<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParaBook</title>

    <link rel="icon" href="img/favicon.ico">
    <link rel="stylesheet" href="css/conteudo-comunidade.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

<header>
    <nav class="container nav">

        <div class="logo-container">
            <img src="img/logo-nova.png" alt="Logo ParaBook" class="logo-img">
            <h1 class="logo">
                <span class="para">Para</span><span class="book">Book</span>
            </h1>
        </div>

        <ul class="menu">
            <li><a href="index.html">Início</a></li>
            <li><a href="acesso-biblioteca.html">Meus Livros</a></li>
            <li><a href="comunidade.html">Comunidades</a></li>
            <li><a href="sobre.html">Sobre</a></li>
            <li><a href="perfil.html" id="linkPerfil" style="display: none;">Perfil</a></li>
                    <li>
                        <button id="theme-toggle" class="login-btn">🌙</button>
                    </li>   
        </ul>

    </nav>
</header>

<main>

<section class="banner-comunidade">
    <h2 id="titulo-comunidade"></h2>
    <p id="descricao-comunidade"></p>
</section>

<section class="posts-section">
    <h3>Postagens</h3>
<div class="search-box">
    <input 
        type="text" 
        id="search-posts" 
        placeholder="Buscar posts..."
        oninput="filtrarPosts()"
    >
</div>
    <div id="lista-posts"></div>
</section>

<section class="post-form-container">
    <h3>Adicionar postagem</h3>

    <div class="form-group">
        <label for="titulo-post">Título</label>
        <input id="titulo-post" type="text">
    </div>

    <div class="form-group">
        <label for="texto-post">Mensagem</label>
        <textarea id="texto-post"></textarea>
    </div>

    <button class="btn-publicar" onclick="criarPost()">Publicar</button>
</section>

</main>

<script src="js/script.js"></script>
<script src="js/index.js"></script>

</body>
</html>
