<!DOCTYPE html>
<html lang="pt-br">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ParaBook</title>
        <link rel="icon" type="image/x-icon" href="img/favicon.ico">
        <link rel="stylesheet" href="css/conteudo-comunidade.css">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </head>

    <body>

        <header>
            <nav class="container nav">

                <div class="logo-container">
                    <img src="img/logo-nova.png" alt="Logo Parabook"
                        class="logo-img">
                    <h1 class="logo"><span class="para">Para</span><span
                            class="book">Book</span></h1>
                </div>
                <ul class="menu">
                    <li><a href="index.html">Início</a></li>
                    <li><a href="acesso-biblioteca.html">Meus Livros</a></li>
                    <li><a href="comunidade.html">Comunidades</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="perfil.html">Perfil</a></li>
                    <li><a href="tela-login.html"><button
                                class="login-btn">Entrar</button></a></li>
                </ul>
            </nav>
        </header>

        <main>

        <!-- banner, titulo e descrição da comunidade -->
        <section class="banner-comunidade">
            <h2 id="titulo-comunidade"></h2>
            <p id="descricao-comunidade"></p>
        </section>

        <!-- posts da comunidade -->
        <section class="posts-section">
            <h3>Postagens</h3>
            <div id="lista-posts"></div>
        </section>

        <!-- criação de post da comunidade-->
        <section class="post-form-container">
            <h3> Adicionar postagem</h3>
            
            <div class="form-group">
                <label for="titulo-post">Título da postagem</label>
                <input type="text" id="titulo-post" placeholder="Sobre o que deseja falar?">
            </div>

            <div class="form-group">
                <label for="texto-post">Seu comentário</label>
                <textarea id="texto-post" placeholder="Deixe seu comentários..."></textarea>
            </div>

            <button class="btn-publicar" onclick="criarPost()">Publicar</button>
        </section>

        </main>
        
        <footer class="footer">
            <div class="footer-container">

                <div class="footer-brand">
                    <h2>ParaBook</h2>
                    <p>O melhor site de livros.</p>
                </div>

                <div class="footer-links">
                    <h4>Links</h4>
                    <a href="index.html">Início</a>
                    <a href="biblioteca.html">Biblioteca</a>
                    <a href="comunidade.html">Comunidades</a>
                </div>

                <div class="footer-social">
                    <h4>Redes</h4>
                    <div class="icons">
                        <i class="fa-brands fa-instagram"></i>
                        <i class="fa-brands fa-facebook"></i>
                        <i class="fa-brands fa-github"></i>
                    </div>
                </div>

            </div>

            <div class="footer-bottom">
                <p>© 2026. Todos os direitos reservados.</p>
            </div>
        </footer>
        <hr class="footer-bottom-line">

<script src="js/script.js"></script>

    </body>
    
</html>
